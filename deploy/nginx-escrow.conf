# BitLocker Escrow - HTTPS front. /unlock and /key are LOCAL-ONLY (not proxied).
server {
    listen 443 ssl;
    server_name YOUR_SERVER_IP;

    ssl_certificate     /etc/nginx/ssl/escrow.crt;
    ssl_certificate_key /etc/nginx/ssl/escrow.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;

    # never expose the local-only endpoints over the network
    location = /unlock { return 404; }
    location = /lock   { return 404; }
    location /key       { return 404; }
    location = /monitor/alerts { return 404; }

    # login: tight brute-force limit
    location = /login {
        limit_req zone=login burst=15 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # quiet favicon (avoid 404 noise)
    location = /favicon.ico { access_log off; return 204; }

    # portal + API: no rate limit (internal, session-protected)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTP -> HTTPS redirect (open port 80 in ufw for this to work)
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

